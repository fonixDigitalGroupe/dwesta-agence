name: Build assets & publish deploy branch

# Le serveur mutualisé LWS n'a pas Node/npm : il ne peut pas compiler les assets.
# Ce workflow compile les assets Vite (GitHub a Node) puis publie sur la branche
# "deploy" le code + les assets compilés (public/build).
# Le serveur n'a plus qu'à faire "git pull" de la branche deploy (voir deploy.sh).
on:
  push:
    branches: [master]
  workflow_dispatch:

# Nécessaire pour pouvoir pousser la branche "deploy".
permissions:
  contents: write

concurrency:
  group: build-publish
  cancel-in-progress: true

jobs:
  build:
    name: Compiler les assets & publier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      - name: Compiler les assets (vite build)
        run: npm run build

      # Publie master + public/build sur la branche "deploy" (écrasée à chaque fois).
      - name: Publier sur la branche deploy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B deploy
          git add -f public/build
          git commit -m "chore: assets compilés depuis ${GITHUB_SHA::7}" --no-verify
          git push -f origin deploy
